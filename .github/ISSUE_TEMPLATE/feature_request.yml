name: Feature request
description: Suggest an improvement or new capability for the project.
title: "[Feature]: "
labels:
  - enhancement
assignees:
  - nickymarzz
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        Please explain the problem you are trying to solve and why the proposed change would be valuable to the project.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      description: Please confirm the following before you continue.
      options:
        - label: I searched existing issues and pull requests for similar requests.
          required: true
        - label: I reviewed the README and CONTRIBUTING guide.
          required: true
        - label: This request is for a project improvement rather than a general support question.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Use case
      description: What problem are you trying to solve, or what workflow would this improve?
      placeholder: Describe the need, pain point, or user story.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
      placeholder: Explain the feature, behavior, or UX you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative approaches, workarounds, or competing ideas you considered.
      placeholder: Tell us what you tried or why other options are not ideal.
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      description: How significant is this request for you or your users?
      options:
        - Nice to have
        - Useful improvement
        - High value
        - Critical blocker
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Additional context
      description: Add mockups, references, constraints, or anything else that would help evaluate the request.
      placeholder: Links, examples from similar tools, screenshots, or compatibility notes.
    validations:
      required: false
